<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" width="128" height="128">
  <defs>
    <linearGradient id="skyGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1a3a5c"/>
      <stop offset="100%" stop-color="#2e6fa3"/>
    </linearGradient>
    <linearGradient id="snowGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#d6eaf8"/>
    </linearGradient>
  </defs>

  <!-- Background circle -->
  <circle cx="64" cy="64" r="62" fill="url(#skyGrad)"/>

  <!-- Stars -->
  <circle cx="20" cy="18" r="1" fill="white" opacity="0.7"/>
  <circle cx="35" cy="10" r="0.8" fill="white" opacity="0.6"/>
  <circle cx="50" cy="16" r="1" fill="white" opacity="0.5"/>
  <circle cx="90" cy="12" r="0.9" fill="white" opacity="0.7"/>
  <circle cx="108" cy="20" r="0.8" fill="white" opacity="0.6"/>
  <circle cx="100" cy="8" r="1" fill="white" opacity="0.5"/>

  <!-- Back mountain range (dark) -->
  <polygon points="10,90 30,52 50,72 70,45 90,68 110,50 128,75 128,95 0,95" fill="#0d2235" opacity="0.8"/>

  <!-- Front mountain (main peak) with snow -->
  <polygon points="0,105 25,105 64,35 103,105 128,105" fill="#1f4e78"/>
  <!-- Snow cap -->
  <polygon points="64,35 52,62 76,62" fill="url(#snowGrad)"/>
  <polygon points="64,35 55,55 73,55" fill="white" opacity="0.9"/>

  <!-- Pine trees (left) -->
  <polygon points="18,105 24,105 21,94" fill="#0a2e1a"/>
  <polygon points="18,98 24,98 21,89" fill="#0d3d22"/>
  <polygon points="22,105 29,105 25.5,93" fill="#0a2e1a"/>
  <polygon points="22,99 29,99 25.5,88" fill="#0d3d22"/>

  <!-- Pine trees (right) -->
  <polygon points="100,105 106,105 103,94" fill="#0a2e1a"/>
  <polygon points="100,98 106,98 103,89" fill="#0d3d22"/>
  <polygon points="104,105 111,105 107.5,93" fill="#0a2e1a"/>
  <polygon points="104,99 111,99 107.5,88" fill="#0d3d22"/>

  <!-- Trail path -->
  <path d="M30,105 Q45,100 55,103 Q64,105 73,102 Q85,99 100,105" 
        stroke="#c8a87a" stroke-width="2" fill="none" stroke-linecap="round" opacity="0.9"/>

  <!-- "JMT" text -->
  <text x="64" y="122" 
        font-family="Georgia, serif" 
        font-size="11" 
        font-weight="bold"
        fill="#a8d8f0" 
        text-anchor="middle" 
        letter-spacing="3">JMT</text>

  <!-- Outer ring -->
  <circle cx="64" cy="64" r="62" fill="none" stroke="#4a9eca" stroke-width="1.5" opacity="0.5"/>
</svg>
